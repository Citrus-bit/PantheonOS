# NATS Server Configuration with WebSocket Support
# 支持前后端统一使用WebSocket协议连接

# 标准NATS端口（保持兼容性）
port: 4222

# WebSocket配置（前端和后端都可以使用）
websocket {
  port: 8080           # WebSocket端口
  no_tls: true         # 开发环境不使用TLS

  # 开发环境：完全禁用Origin检查
  same_origin: false
  # 不设置allowed_origins，允许所有源

  # 握手超时
  handshake_timeout: "2s"

  # 压缩支持
  compression: true
}

# JetStream支持（用于KV存储）
jetstream {
  # 存储目录
  store_dir: "./jetstream_storage"

  # 最大内存使用
  max_memory_store: 1GB

  # 最大文件存储
  max_file_store: 10GB
}

# HTTP监控端口（可选）
http_port: 8222

# 日志配置
log_file: "./nats-server.log"
logtime: true
debug: false
trace: false

# 集群配置（如果需要）
# cluster {
#   name: "pantheon-cluster"
#   listen: localhost:6222
# }

# 认证配置（可选，开发环境可以不配置）
# authorization {
#   users = [
#     {user: "pantheon", password: "password", permissions: {publish: "*", subscribe: "*"}}
#   ]
